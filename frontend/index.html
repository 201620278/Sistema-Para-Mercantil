<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercantil do Nando - PDV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav id="sidebar" class="col-md-2 col-lg-2 d-md-block bg-dark sidebar">
                <div class="position-sticky pt-3">
                    <div class="text-center mb-4">
                        <h5 class="text-white">Mercantil</h5>
                        <small class="text-muted">do Nando</small>
                    </div>
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link text-white active" href="#" data-page="pdv">
                                <i class="fas fa-cash-register"></i> PDV
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="#" data-page="produtos">
                                <i class="fas fa-box"></i> Produtos
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="#" data-page="clientes">
                                <i class="fas fa-users"></i> Clientes
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="#" data-page="compras">
                                <i class="fas fa-shopping-cart"></i> Compras
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="#" data-page="fornecedores">
                                <i class="fas fa-truck"></i> Fornecedores
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="#" data-page="vendas">
                                <i class="fas fa-history"></i> Histórico
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="#" data-page="financeiro">
                                <i class="fas fa-chart-line"></i> Financeiro
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="#" data-page="categorias">
                                <i class="fas fa-tags"></i> Categorias
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="#" data-page="configuracoes">
                                <i class="fas fa-cog"></i> Configurações
                            </a>
                        </li>
                    </ul>
                    
                    <div class="sidebar-footer">
                        <div class="text-white mb-2 small">
                            <i class="fas fa-user"></i> <span id="user-nome">Carregando...</span>
                        </div>
                        <button class="btn btn-danger btn-sm w-100" onclick="logout()">
                            <i class="fas fa-sign-out-alt"></i> Sair
                        </button>
                    </div>
                </div>
            </nav>

            <!-- Main content -->
            <main class="col-md-10 ms-sm-auto col-lg-10 px-md-4">
                <div id="page-content">
                    <div class="text-center p-5">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Carregando...</span>
                        </div>
                        <p class="mt-2">Carregando sistema...</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Modais -->
    <div id="modal-container"></div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/pdv.js"></script>
    <script src="js/produtos.js"></script>
    <script src="js/subcategorias.js"></script>
    <script src="js/clientes.js"></script>
    <script src="js/fornecedores.js"></script>
    <script src="js/compras.js"></script>
    <script src="js/vendas.js"></script>
    <script src="js/financeiro.js"></script>
    <script src="js/configuracoes.js"></script>
    <script src="js/categorias.js"></script>
    <script src="js/app.js"></script>
    
    <script>
        // Função de logout
        function logout() {
            if (confirm('Tem certeza que deseja sair?')) {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = '/login';
            }
        }
        
        // Verificar autenticação ao carregar
        $(document).ready(function() {
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            
            console.log('Token existe?', !!token);
            console.log('User:', user);
            
            if (!token) {
                console.log('Sem token, redirecionando para login');
                window.location.href = '/login';
                return;
            }
            
            // Mostrar nome do usuário
            $('#user-nome').text(user.nome || 'Usuário');
            
            // Configurar AJAX para enviar token em todas as requisições
            $.ajaxSetup({
                beforeSend: function(xhr, settings) {
                    // Não enviar token para arquivos estáticos
                    if (settings.url && !settings.url.includes('/api/')) {
                        return;
                    }
                    const token = localStorage.getItem('token');
                    if (token) {
                        xhr.setRequestHeader('Authorization', 'Bearer ' + token);
                    }
                }
            });
            
            // Testar token com o servidor
            $.ajax({
                url: `${API_URL}/auth/verificar`,
                method: 'POST',
                success: function(data) {
                    console.log('Token válido:', data);
                    // Carregar página inicial
                    if (typeof loadPage === 'function') {
                        loadPage('pdv');
                    }
                },
                error: function(xhr) {
                    console.log('Token inválido:', xhr);
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    window.location.href = '/login';
                }
            });
        });
    </script>
</body>
</html>
